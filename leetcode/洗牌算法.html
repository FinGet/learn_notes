<body>
    <script>
    let arr = [1, 2, 3, 4, 5, 6]

    Array.prototype.shuffle = function() {
        let m = this.length,
            i;
        while (m) {
            i = (Math.random() * m--) >>> 0;
            [this[m], this[i]] = [this[i], this[m]] // 解构
        }
        return this;
    }
    console.log(arr.shuffle())
    </script>
</body>
