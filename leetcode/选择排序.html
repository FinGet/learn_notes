<body>
	<script>
		let arr = [89, 19, 90, 9, 3, 21, 5, 77, 10, 22]
		function bubbleSort(arr) {
      let len = arr.length
      let min = ''
      for (let i = 0 ; i < len-1 ; i++) {
      	min = i
        for (let j = i+1; j < len; j++) {
          if (arr[min] > arr[j]) {
            min = j
          }
        }
        [arr[i], arr[min]] = [arr[min], arr[i]]
        console.log(`i=${i}; min=${min}; arr=${arr}`)
      }
      return arr;
    }
    bubbleSort(arr)
	</script>
</body>
