<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<title></title>
	<link rel="stylesheet" href="">
</head>
<body>
	<script>
		let routes = [
			{
				name:'首页',
				path: '/',
				icon: 'xxx'
			},
			{
				name:'系统消息',
				path: '/system',
				icon: 'xxx'
				children: [
					{
						name:'系统消息列表',
						path: '/system/list',
						icon: 'xxx'
					},
					{
						name:'系统日志',
						path: '/system/log',
						icon: 'xxx'
					}
				]
			}
		]


		<el-menu
			class="el-menu-vertical"
			unique-opened
			:collapse="!value"
			router
			:default-active="activeIndex"
		>
			<template v-for="item in routes">
				<template v-if="item.children">
					<el-submenu
						:key="item.path"
						:index="item.path"
					>
						<template slot="title">
							<i :class="[item.icon,'icon']"/>
							<span>{{ item.name }}</span>
						</template>
						<template v-for="subItem in item.children">
							<el-menu-item
								v-if="subItem.name"
								:key="subItem.path"
								:index="subItem.path"
							>
								{{ subItem.name }}
							</el-menu-item>
						</template>
					</el-submenu>
				</template>
				<template v-else>
					<el-menu-item
						:key="item.path"
						:index="item.path"
						v-if="item.name"
					>
						<i :class="item.icon"/>
						<span slot="title">
							{{ item.name }}
						</span>
					</el-menu-item>
				</template>
			</template>
		</el-menu>
	</script>
</body>
</html>
